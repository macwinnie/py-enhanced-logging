name: Build python library and publish to PyPI (uv)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

env:
  WD_PATH: package_repo

jobs:
  build-docs-tag-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: ${{ env.WD_PATH }}
          fetch-depth: 0   # needed for tags
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync (install dev deps)
        working-directory: ${{ env.WD_PATH }}
        run: uv sync --dev

      - name: Determine version (and bump if tag exists)
        id: versionize
        working-directory: ${{ env.WD_PATH }}
        run: |
          uv run python _wf/versionize.py >> "$GITHUB_OUTPUT"

      - name: Inject last built version into README.md
        working-directory: ${{ env.WD_PATH }}
        env:
          VERSIONTAG: ${{ steps.versionize.outputs.versiontag }}
        run: |
          sed -i -E "s/(Last built version: \`)v[0-9]+\.[0-9]+\.[0-9]+(\`)/\1${VERSIONTAG}\2/" README.md

      - name: Build docs (pdoc) + postprocess HTML
        working-directory: ${{ env.WD_PATH }}
        env:
          VERSIONTAG: ${{ steps.versionize.outputs.versiontag }}
        run: |
          rm -rf docs || true
          mkdir -p docs
          uv run pdoc enhanced_logging --docformat google --output-dir docs
          uv run python _wf/adjust_pdoc.py

      - name: Build dist
        working-directory: ${{ env.WD_PATH }}
        run: uv build

      - name: Import GPG key from secrets (commit signing)
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASS }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          workdir: ./${{ env.WD_PATH }}

      - name: Commit, push, and tag (signed commit)
        working-directory: ${{ env.WD_PATH }}
        env:
          VERSIONTAG: ${{ steps.versionize.outputs.versiontag }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github.actions@macwinnie.me"
          git config commit.gpgsign true

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -S -m "Publish currently built version ${VERSIONTAG}"
            git push origin main
          fi

          # Create lightweight tag if not already present
          if git rev-parse "${VERSIONTAG}" >/dev/null 2>&1; then
            echo "Tag ${VERSIONTAG} already exists."
          else
            git tag "${VERSIONTAG}"
            git push origin "${VERSIONTAG}"
          fi

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.versionize.outputs.version_changed == '1'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ env.WD_PATH }}/dist
